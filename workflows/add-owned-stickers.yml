name: Add owned stickers

on:
  workflow_dispatch:
    inputs:
      stickers:
        description: 'JSON array of sticker IDs to mark as owned. Example: ["BEL12","SCO10"]'
        required: true
        type: string
      source:
        description: 'Source of the update'
        required: false
        default: 'gpt'
        type: string

permissions:
  contents: write

jobs:
  update-stickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update sticker files
        run: |
          python scripts/update_stickers.py '${{ inputs.stickers }}' '${{ inputs.source }}'

      - name: Commit changes
        run: |
          git config user.name "Gerenciador Figurinhas Copa 2026"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Atualiza coleção de figurinhas" || echo "No changes to commit"
          git push
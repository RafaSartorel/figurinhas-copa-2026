name: Add repeated stickers

on:
  workflow_dispatch:
    inputs:
      stickers:
        description: 'JSON array of repeated sticker IDs or objects with quantity. Example: ["BEL12", {"sticker_id":"SCO10","quantity":2}]'
        required: true
        type: string
      source:
        description: 'Source of the update'
        required: false
        default: 'gpt'
        type: string

permissions:
  contents: write

concurrency:
  group: figurinhas-data-updates
  cancel-in-progress: false

jobs:
  add-repeated-stickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Update repeated sticker files
        env:
          STICKERS: ${{ inputs.stickers }}
          SOURCE: ${{ inputs.source }}
        run: |
          python scripts/update_repeated_stickers.py add "$STICKERS" "$SOURCE"

      - name: Commit changes
        run: |
          git config user.name "Gerenciador Figurinhas Copa 2026"
          git config user.email "actions@github.com"
          git add data/repeated.json data/repeated-summary.json data/repeated.csv
          git commit -m "Atualiza repetidas: adiciona figurinhas" || echo "No changes to commit"
          git push

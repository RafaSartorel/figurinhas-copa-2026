name: Remove owned stickers

on:
  workflow_dispatch:
    inputs:
      stickers:
        description: 'JSON array of sticker IDs to mark as missing. Example: ["BEL12","SCO10"]'
        required: true
        type: string
      source:
        description: 'Source of the update'
        required: false
        default: 'gpt'
        type: string

permissions:
  contents: write

concurrency:
  group: figurinhas-data-updates
  cancel-in-progress: false

jobs:
  remove-stickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Update sticker files
        env:
          STICKERS: ${{ inputs.stickers }}
          SOURCE: ${{ inputs.source }}
        run: |
          python scripts/update_stickers.py remove "$STICKERS" "$SOURCE"

      - name: Commit changes
        run: |
          git config user.name "Gerenciador Figurinhas Copa 2026"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Atualiza coleção: remove figurinhas" || echo "No changes to commit"
          git push
